name: Feature request
description: Suggest a workflow, adapter, or tooling improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user need or market workflow is missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: Keep assumptions and market scope explicit.
