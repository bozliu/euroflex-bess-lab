  - Operator runbook: operator_runbook.md
  - Execution handoff: execution_handoff.md
  - Service API: service_api.md
  - Run registry: run_registry.md
  - Release notes: release_notes.md
  - BYO-ML forecast provider: byo_ml_forecast_provider.md
  - Export profiles: export_profiles.md
  - Migration v3 to v4: migration_v3_to_v4.md
  - Architecture: architecture.md
  - Config schema: config_schema.md
  - Connector caching and freshness: connector_caching_and_freshness.md
  - Revision workflow: revision_workflow.md
  - Commitment locking: commitment_locking.md
  - Reconciliation and audit: reconciliation.md
  - Public checkpoint revision limitations: public_checkpoint_revision_limitations.md
  - Artifact contract: artifact_contract.md
  - Data provenance: data_provenance.md
