site_name: euroflex_bess_lab
site_description: Belgium-first BESS portfolio scheduling, revision, audit, and operational integration for European flexibility workflows
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
plugins:
  - search
markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
nav:
